name: Build and publish APT repository

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  detect-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            base_sha="${{ github.event.before }}"
          else
            base_sha="HEAD~1"
          fi

          echo "Base SHA: $base_sha"

          mapfile -t pkg_dirs < <(git ls-files \
            | grep -E '/debian/' \
            | sed 's|/debian/.*||' \
            | sort -u)

          changed=()
          for pkg in "${pkg_dirs[@]}"; do
            if git diff --name-only "$base_sha" HEAD | grep -q "^${pkg}/"; then
              changed+=("$pkg")
            fi
          done

          packages=$(printf '%s\n' "${changed[@]}" | jq -R . | jq -s -c 'map(select(. != ""))')
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "Detected packages: $packages"

  build-packages:
    runs-on: ubuntu-latest
    needs: detect-packages
    if: ${{ needs.detect-packages.outputs.packages != '[]' }}
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect-packages.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute package slug
        id: slug
        run: |
          slug=$(echo "${{ matrix.package }}" | tr '/' '-')
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          echo "Package path: ${{ matrix.package }}, slug: $slug"

      - name: Read package version
        id: version
        run: |
          version=$(head -1 "${{ matrix.package }}/debian/changelog" | grep -oP '\(\K[^)]+')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Package: ${{ matrix.package }}, version: $version"

      - name: Build Debian package
        run: docker build -t "pkg-${{ steps.slug.outputs.slug }}" "${{ matrix.package }}"

      - name: Extract .deb from image
        run: |
          cid=$(docker create "pkg-${{ steps.slug.outputs.slug }}")
          docker cp "$cid:/out" ./out
          docker rm "$cid"
          find ./out -maxdepth 1 -name '*.deb' -exec mv -t . {} +
          rm -rf ./out
          echo "${{ matrix.package }}" > package-path.txt
          ls -lh ./*.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ steps.slug.outputs.slug }}
          path: |
            ./*.deb
            package-path.txt

  publish-repo:
    runs-on: ubuntu-latest
    needs: build-packages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: deb-*

      - name: Install reprepro and gnupg
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro gnupg

      - name: Configure GPG agent
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye

      - name: Import GPG signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          if [ -z "$APT_GPG_PRIVATE_KEY" ]; then
            echo "Error: APT_GPG_PRIVATE_KEY secret is not set" >&2
            exit 1
          fi
          if [ -n "$APT_GPG_PASSPHRASE" ]; then
            echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --yes --pinentry-mode loopback --passphrase "$APT_GPG_PASSPHRASE" --import
          else
            echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --yes --import
          fi
          KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | head -1 | cut -d: -f5)
          echo "KEY_ID=$KEY_ID" >> "$GITHUB_ENV"

      - name: Cache passphrase for reprepro
        env:
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          if [ -n "$APT_GPG_PASSPHRASE" ]; then
            KEYGRIP=$(gpg --list-secret-keys --with-colons | awk -F: '/^grp/ {print $10; exit}')
            PRESET=$(command -v gpg-preset-passphrase || find /usr/lib -name gpg-preset-passphrase 2>/dev/null | head -1)
            if [ -z "$PRESET" ]; then
              echo "gpg-preset-passphrase not found" >&2
              exit 1
            fi
            "$PRESET" --preset --passphrase "$APT_GPG_PASSPHRASE" "$KEYGRIP"
          fi

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure reprepro configuration
        run: |
          mkdir -p repo/conf
          cat > repo/conf/distributions <<EOF
          Origin: ratatui-todo-list
          Label: ratatui-todo-list
          Suite: stable
          Codename: stable
          Architectures: amd64
          Components: main
          Description: APT repository for ratatui-todo-list (stable)
          SignWith: ${{ env.KEY_ID }}

          Origin: ratatui-todo-list
          Label: ratatui-todo-list
          Suite: testing
          Codename: testing
          Architectures: amd64
          Components: main
          Description: APT repository for ratatui-todo-list (testing)
          SignWith: ${{ env.KEY_ID }}

          Origin: ratatui-todo-list
          Label: ratatui-todo-list
          Suite: unstable
          Codename: unstable
          Architectures: amd64
          Components: main
          Description: APT repository for ratatui-todo-list (unstable)
          SignWith: ${{ env.KEY_ID }}
          EOF
          gpg --export "${{ env.KEY_ID }}" > repo/KEY.gpg

      - name: Publish packages
        run: |
          for pkg_dir in ./artifacts/deb-*; do
            pkg_path=$(cat "$pkg_dir/package-path.txt")
            deb_file=$(find "$pkg_dir" -maxdepth 1 -name '*.deb' -print -quit)
            pkg_name=$(dpkg-deb -f "$deb_file" Package)
            version=$(head -1 "$pkg_path/debian/changelog" | grep -oP '\(\K[^)]+')
            dist=$(head -1 "$pkg_path/debian/changelog" | grep -oP '\)\s+\K[^;]+')

            case "$dist" in
              stable|testing|unstable) ;;
              *)
                echo "::error::Unknown distribution '$dist' in $pkg_path/debian/changelog. Allowed: stable, testing, unstable." >&2
                exit 1
                ;;
            esac

            echo "Publishing $pkg_name ($pkg_path) version $version to $dist"

            existing=$(reprepro -b repo list "$dist" "$pkg_name" | grep "${pkg_name} ${version}" || true)
            if [ -n "$existing" ]; then
              echo "::error::Version ${version} of ${pkg_name} already exists in ${dist}."
              exit 1
            fi

            pool_file="repo/pool/main/${pkg_name:0:1}/${pkg_name}/${pkg_name}_${version}_amd64.deb"
            if [ -f "$pool_file" ] && ! cmp -s "$deb_file" "$pool_file"; then
              echo "::error::Version ${version} of ${pkg_name} already exists in pool with different content. Bump the Debian version to publish a new build." >&2
              exit 1
            fi

            reprepro -b repo includedeb "$dist" "$deb_file"
          done

      - name: Commit and push gh-pages
        run: |
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore(apt): update repository" || echo "No changes"
          git push origin gh-pages
